<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⤷ ゛KANADE ˎˊ — Upload</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F8E4;--card:rgba(255,255,255,.72);--line:rgba(155,209,206,.45);
  --red:#F8F8E4;--red2:#DFF0DD;--red3:#9BD1CE;--text:#1a2e2b;--muted:#5a7a76}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:32px 16px;overflow-y:auto;overflow-x:hidden;position:relative}
#grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;
  background-image:linear-gradient(rgba(155,209,206,.20) 1px,transparent 1px),
    linear-gradient(90deg,rgba(155,209,206,.20) 1px,transparent 1px);
  background-size:46px 46px;animation:gridmove 18s linear infinite}
@keyframes gridmove{from{background-position:0 0}to{background-position:46px 46px}}
#aurora{position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(80px);opacity:.7;
  background:radial-gradient(40% 40% at 30% 30%,rgba(155,209,206,.55),transparent 70%),
    radial-gradient(40% 40% at 70% 60%,rgba(223,240,221,.5),transparent 70%),
    radial-gradient(35% 35% at 50% 80%,rgba(248,248,228,.5),transparent 70%);
  animation:aurora 12s ease-in-out infinite}
@keyframes aurora{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4%,-3%) scale(1.08)}66%{transform:translate(-3%,4%) scale(.96)}}
#fx{position:fixed;inset:0;z-index:0;pointer-events:none}
.container{position:relative;z-index:1;width:100%;max-width:560px;margin:auto;
  background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(155,209,206,.45);
  border-radius:20px;padding:40px 34px;overflow:hidden;box-shadow:0 40px 100px -30px rgba(26,46,43,.35),0 0 70px -18px rgba(155,209,206,.5)}
.brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
.logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:22px;
  background:linear-gradient(135deg,var(--red3),var(--red2));box-shadow:0 8px 26px -8px var(--red3)}
h1{font-size:1.6rem;font-weight:900;letter-spacing:-.02em;
  background:linear-gradient(90deg,#0f5e58 0%,#2a8a82 25%,#3aa89e 50%,#2a8a82 75%,#0f5e58 100%);
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;filter:drop-shadow(0 0 18px rgba(155,209,206,.5))}
@keyframes shine{to{background-position:200% center}}
.subtitle{text-align:center;color:var(--muted);font-size:.92rem;margin:10px 0 26px}
.badge{display:inline-flex;align-items:center;gap:6px;margin:0 auto 22px;padding:6px 14px;border-radius:999px;
  font-size:.78rem;font-weight:600;color:#1a2e2b;background:rgba(155,209,206,.20);
  border:1px solid rgba(155,209,206,.45);width:fit-content}
.badge .dot{width:7px;height:7px;border-radius:50%;background:#5bbdb5;box-shadow:0 0 10px #5bbdb5;animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.wrap-badge{display:flex;justify-content:center}
.upload-zone{border:1.5px dashed rgba(155,209,206,.6);border-radius:18px;padding:52px 20px;text-align:center;
  cursor:pointer;transition:.25s;background:rgba(255,255,255,.4);position:relative;overflow:hidden}
.upload-zone:hover{border-color:#5bbdb5;background:rgba(155,209,206,.18);transform:translateY(-2px)}
.upload-zone.dragover{border-color:#2a8a82;background:rgba(155,209,206,.28)}
.upload-icon{font-size:2.8rem;filter:drop-shadow(0 6px 14px rgba(155,209,206,.55))}
.upload-zone p{margin-top:14px;color:#1a2e2b;font-weight:500}
.upload-zone span{color:var(--muted);font-size:.84rem}
input[type=file]{display:none}
.field{margin-top:20px}
.field label{display:block;color:var(--muted);font-size:.8rem;font-weight:600;margin-bottom:7px}
.field input{width:100%;padding:13px 15px;background:rgba(255,255,255,.6);border:1px solid var(--line);
  border-radius:12px;color:var(--text);font-size:.92rem;font-family:ui-monospace,Menlo,monospace;outline:none}
.field input:focus{border-color:#2a8a82;box-shadow:0 0 0 3px rgba(155,209,206,.3)}
.btn{display:block;width:100%;padding:15px;margin-top:22px;border:none;border-radius:13px;font-size:.98rem;
  cursor:pointer;font-weight:800;color:#fff;font-family:inherit;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#2a8a82,#5bbdb5);box-shadow:0 12px 32px -10px rgba(42,138,130,.7);transition:.2s}
.btn:hover:not(:disabled){transform:translateY(-2px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.meta{display:none;margin-top:18px;padding:14px 16px;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:14px}
.meta.show{display:block}
.meta .fname{font-weight:600;font-size:.92rem;word-break:break-all}
.meta .fsize{color:var(--muted);font-size:.82rem;margin-top:2px}
.progress{margin-top:18px;display:none}
.progress.show{display:block}
.progress .track{height:9px;background:rgba(155,209,206,.25);border-radius:99px;overflow:hidden}
.progress .fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#2a8a82,#3aa89e);transition:width .25s ease}
.progress .pct{display:flex;justify-content:space-between;margin-top:8px;font-size:.8rem;color:var(--muted);font-weight:600}
.info{margin-top:18px;padding:15px 17px;border-radius:14px;font-size:.9rem;display:none;line-height:1.5}
.info.show{display:block}
.info.error{background:rgba(214,69,80,.12);border:1px solid rgba(214,69,80,.4);color:#b32434}
.info.success{background:rgba(42,138,130,.12);border:1px solid rgba(42,138,130,.4);color:#0f5e58}
.info a{color:#2a8a82;font-weight:600;text-decoration:none;word-break:break-all}
.info code{background:rgba(155,209,206,.25);padding:2px 7px;border-radius:6px;font-size:.85em;font-family:ui-monospace,Menlo,monospace}
.back{display:block;text-align:center;margin-top:18px;color:var(--muted);font-size:.82rem;text-decoration:none}
.back:hover{color:#1a2e2b}
</style>
</head>
<body>
<div id="grid"></div>
<div id="aurora"></div>
<canvas id="fx"></canvas>
<div class="container">
  <div class="brand"><div class="logo">&#128193;</div><h1>⤷ ゛KANADE ˎˊ</h1></div>
  <p class="subtitle">Partagez vos fichiers volumineux en toute simplicité</p>
  <div class="wrap-badge"><div class="badge"><span class="dot"></span> Jusqu'à 10 Go par fichier</div></div>

  <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">&#128228;</div>
    <p>Glissez un fichier ici</p>
    <span>ou cliquez pour parcourir</span>
  </div>
  <input type="file" id="fileInput">

  <div id="meta" class="meta">
    <div class="fname" id="fileInfo"></div>
    <div class="fsize" id="fileSize"></div>
  </div>

  <div class="field">
    <label for="channelId">Salon Discord de destination (optionnel)</label>
    <input type="text" id="channelId" placeholder="ID du salon — ex : 123456789012345678" autocomplete="off">
  </div>

  <button class="btn" id="uploadBtn" disabled>Envoyer le fichier</button>

  <div class="progress" id="progressBar">
    <div class="track"><div class="fill" id="progressFill"></div></div>
    <div class="pct"><span id="pctText">0%</span><span id="speedText"></span></div>
  </div>

  <div class="info" id="resultBox"></div>

  <a class="back" href="./">← Retour au site</a>
</div>

<script>
const BACKEND = "http://82.70.235.131:9090";
const MAX_BYTES = 10000 * 1024 * 1024;
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
  uploadBtn=document.getElementById('uploadBtn'),progressBar=document.getElementById('progressBar'),
  progressFill=document.getElementById('progressFill'),resultBox=document.getElementById('resultBox'),
  fileInfo=document.getElementById('fileInfo'),fileSize=document.getElementById('fileSize'),
  meta=document.getElementById('meta'),pctText=document.getElementById('pctText'),speedText=document.getElementById('speedText');
let selectedFile=null;
function formatSize(b){if(b<1024)return b+' o';if(b<1048576)return(b/1024).toFixed(1)+' Ko';if(b<1073741824)return(b/1048576).toFixed(1)+' Mo';return(b/1073741824).toFixed(2)+' Go'}
function resetResult(){resultBox.className='info';resultBox.innerHTML='';resultBox.classList.remove('show')}
function selectFile(f){
  selectedFile=f;resetResult();fileInfo.textContent=f.name;meta.classList.add('show');
  if(f.size>MAX_BYTES){fileSize.textContent='Taille : '+formatSize(f.size)+' — trop volumineux (max '+formatSize(MAX_BYTES)+')';fileSize.style.color='#b32434';uploadBtn.disabled=true;
    resultBox.className='info error show';resultBox.textContent='Fichier refusé : la taille dépasse la limite de '+formatSize(MAX_BYTES)+'.';return;}
  fileSize.style.color='';fileSize.textContent='Taille : '+formatSize(f.size);uploadBtn.disabled=false;
}
fileInput.addEventListener('change',e=>{if(e.target.files.length)selectFile(e.target.files[0])});
['dragenter','dragover'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();dropZone.classList.add('dragover')}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==='drop'){dropZone.classList.remove('dragover');if(e.dataTransfer&&e.dataTransfer.files.length)selectFile(e.dataTransfer.files[0]);}else if(e.clientX===0&&e.clientY===0){dropZone.classList.remove('dragover');}}));
uploadBtn.addEventListener('click',()=>{
  if(!selectedFile)return;
  const fd=new FormData();fd.append('file',selectedFile);
  const chId=document.getElementById('channelId').value.trim();if(chId)fd.append('channel_id',chId);
  const xhr=new XMLHttpRequest();xhr.open('POST',BACKEND+'/api/upload',true);
  progressBar.classList.add('show');let lastT=Date.now(),lastL=0;
  xhr.upload.onprogress=e=>{if(e.lengthComputable){const pct=Math.round(e.loaded/e.total*100);progressFill.style.width=pct+'%';pctText.textContent=pct+'%';
    const now=Date.now(),dt=(now-lastT)/1000;if(dt>0.4){const sp=(e.loaded-lastL)/dt;speedText.textContent=formatSize(sp)+'/s';lastT=now;lastL=e.loaded;}}};
  uploadBtn.disabled=true;uploadBtn.textContent='Envoi en cours…';
  xhr.onload=()=>{if(xhr.status===200){const r=JSON.parse(xhr.responseText);progressFill.style.width='100%';pctText.textContent='100%';
    resultBox.className='info success show';resultBox.innerHTML='<b>✅ Fichier envoyé !</b><br>Lien de téléchargement :<br><a href="'+r.url+'" target="_blank">'+r.url+'</a><br>ID : <code>'+r.file_id+'</code><br><br>Pour partager sur Discord, tapez :<br><code>/partager-fichier file_id:'+r.file_id+'</code>';
  }else{let msg='Erreur inconnue';try{msg=JSON.parse(xhr.responseText).error||msg}catch(e){}resultBox.className='info error show';resultBox.textContent=msg;}
    uploadBtn.disabled=false;uploadBtn.textContent='Envoyer le fichier';};
  xhr.onerror=()=>{resultBox.className='info error show';resultBox.textContent='Erreur réseau — vérifiez votre connexion ou que le serveur est en ligne.';uploadBtn.disabled=false;uploadBtn.textContent='Envoyer le fichier';};
  xhr.send(fd);
});
</script>
</body>
</html>
